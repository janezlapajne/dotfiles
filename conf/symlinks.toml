[symlinks]
# Files symlinked to $HOME/<filename> (the common case)
# Source paths relative to conf/dotfiles/
root = [
	"git/.gitconfig",
	"git/.gitconfig.local",
	"vim/.vimrc",
	"vim/.vimrc.local",
	"vim/.ideavimrc",
	"zsh/.zshrc",
	"tmux/.tmux.conf",
	"tmux/.tmux.conf.local",
]

# Custom destinations: source = "target_dir_relative_to_home"
# Filename is preserved, value is the parent directory.
# Example: "starship/starship.toml" = ".config"  ->  ~/.config/starship.toml
[symlinks.targets]
"karabiner/karabiner.json" = ".config/karabiner"
"worktrunk/config.toml" = ".config/worktrunk"
"worktrunk/setup-farming-data-layer.sh" = ".config/worktrunk"
"vscode/settings.json" = "Library/Application Support/Code/User"
"vscode/keybindings.json" = "Library/Application Support/Code/User"
"claude/settings.json" = ".claude"
"claude/hooks/cmux-notify.sh" = ".claude/hooks"
"starship/starship.toml" = ".config"
