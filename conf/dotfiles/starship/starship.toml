# Inspired by: https://github.com/Sin-cy/dotfiles/blob/main/starship/.config/starship/starship.toml
# Only overrides that add value beyond starship defaults.

"$schema" = "https://starship.rs/config-schema.json"

# Git status with counts (default shows symbols but not how many files)
[git_status]
staged = "[+${count} ](green)"
modified = "[!${count} ](yellow)"
renamed = "[»${count} ](blue)"
deleted = "[-${count} ](red)"
untracked = "[?${count} ](cyan)"
stashed = "[≡${count} ](purple)"
conflicted = "[✖${count} ](red bold)"
ahead = "[⇡${count} ](teal)"
behind = "[⇣${count} ](peach)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count} ](mauve)"

# Worktree indicator (not in default starship, useful with worktrunk)
[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "⛓ "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true
